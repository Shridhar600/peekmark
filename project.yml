name: PeekMark
options:
  bundleIdPrefix: app.peekmark
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_NAME: $(TARGET_NAME)
    DEAD_CODE_STRIPPING: YES
packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    exactVersion: 0.8.0
targets:
  PeekMark:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
      - path: Assets/Assets.xcassets
      - path: WebAssets
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.peekmark.mac
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/PeekMark.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: PeekMarkQuickLookExtension
        embed: true
      - package: swift-markdown
        product: Markdown
  PeekMarkQuickLookExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extension
      - path: Shared
      - path: WebAssets
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Extension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.peekmark.mac.quicklook
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Extension/PeekMarkQuickLookExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - package: swift-markdown
        product: Markdown
  PeekMarkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Shared
      - path: WebAssets
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.peekmark.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: swift-markdown
        product: Markdown
schemes:
  PeekMark:
    build:
      targets:
        PeekMark: all
        PeekMarkTests: [test]
    test:
      targets:
        - PeekMarkTests
  PeekMarkTests:
    build:
      targets:
        PeekMarkTests: all
    test:
      targets:
        - PeekMarkTests
